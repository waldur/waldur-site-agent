suite: report deployment
templates:
  - templates/deployment-report.yaml
  - templates/secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render when enabled (default)
    template: templates/deployment-report.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-release-waldur-site-agent-report

  - it: should not render deployment when disabled
    template: templates/deployment-report.yaml
    set:
      agents.report.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct component label
    template: templates/deployment-report.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: report
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: report

  - it: should pass correct mode argument
    template: templates/deployment-report.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--mode"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "report"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--config-file"

  - it: should set container name
    template: templates/deployment-report.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: report

  - it: should set replicas from values
    template: templates/deployment-report.yaml
    set:
      agents.report.replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should use correct selector labels
    template: templates/deployment-report.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: report

  - it: should include health check probes with correct command
    template: templates/deployment-report.yaml
    set:
      healthCheck.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec.command
          value:
            - waldur_site_diagnostics
            - --config-file
            - /etc/waldur-site-agent/config.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.exec.command
          value:
            - waldur_site_diagnostics
            - --config-file
            - /etc/waldur-site-agent/config.yaml

  - it: should mount config and tmp volumes
    template: templates/deployment-report.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/waldur-site-agent
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
