suite: template helpers
templates:
  - templates/deployment-event-process.yaml
  - templates/secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should use release name in fullname
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-release-waldur-site-agent-event-process

  - it: should respect nameOverride
    template: templates/deployment-event-process.yaml
    set:
      nameOverride: my-agent
    asserts:
      - equal:
          path: metadata.name
          value: test-release-my-agent-event-process

  - it: should respect fullnameOverride
    template: templates/deployment-event-process.yaml
    set:
      fullnameOverride: my-custom-agent
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-agent-event-process

  - it: should set app version label
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "latest"

  - it: should use custom secret name in volume
    template: templates/deployment-event-process.yaml
    set:
      secret.name: my-existing-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: my-existing-secret
