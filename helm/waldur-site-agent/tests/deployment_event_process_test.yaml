suite: event-process deployment
templates:
  - templates/deployment-event-process.yaml
  - templates/secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should not render deployment when disabled
    template: templates/deployment-event-process.yaml
    set:
      agents.eventProcess.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled (default)
    template: templates/deployment-event-process.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-release-waldur-site-agent-event-process

  - it: should set correct labels
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: event-process
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: event-process
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]

  - it: should use correct selector labels
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: waldur-site-agent
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: event-process

  - it: should set replicas from values
    template: templates/deployment-event-process.yaml
    set:
      agents.eventProcess.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should default to 1 replica
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should pass correct CLI arguments
    template: templates/deployment-event-process.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--mode"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "event_process"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--config-file"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "/etc/waldur-site-agent/config.yaml"

  - it: should mount config volume read-only
    template: templates/deployment-event-process.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/waldur-site-agent
            readOnly: true

  - it: should mount tmp volume
    template: templates/deployment-event-process.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: should use secret volume for config
    template: templates/deployment-event-process.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: test-release-waldur-site-agent-secret

  - it: should use emptyDir for tmp
    template: templates/deployment-event-process.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should set default image
    template: templates/deployment-event-process.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "opennode/waldur-site-agent:latest"

  - it: should use custom registry
    template: templates/deployment-event-process.yaml
    set:
      image.registry: my-registry.io
      image.repository: custom/agent
      image.tag: "1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry.io/custom/agent:1.0.0"

  - it: should set image pull policy
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: should include health checks when enabled
    template: templates/deployment-event-process.yaml
    set:
      healthCheck.enabled: true
      healthCheck.initialDelaySeconds: 30
      healthCheck.periodSeconds: 60
      healthCheck.timeoutSeconds: 10
      healthCheck.failureThreshold: 3
      healthCheck.successThreshold: 1
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec.command
          value:
            - waldur_site_diagnostics
            - --config-file
            - /etc/waldur-site-agent/config.yaml
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 60
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 3
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.successThreshold
          value: 1

  - it: should exclude health checks when disabled
    template: templates/deployment-event-process.yaml
    set:
      healthCheck.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should set default resource limits
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1024Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi

  - it: should apply pod security context
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should apply container security context
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should use Recreate strategy
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should include checksum annotation for secret
    template: templates/deployment-event-process.yaml
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/secret"]

  - it: should apply custom pod annotations
    template: templates/deployment-event-process.yaml
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should apply node selector when set
    template: templates/deployment-event-process.yaml
    set:
      nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should not set node selector by default
    template: templates/deployment-event-process.yaml
    asserts:
      - isNull:
          path: spec.template.spec.nodeSelector

  - it: should apply tolerations when set
    template: templates/deployment-event-process.yaml
    set:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "hpc"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "hpc"
            effect: "NoSchedule"

  - it: should apply affinity when set
    template: templates/deployment-event-process.yaml
    set:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity

  - it: should apply image pull secrets when set
    template: templates/deployment-event-process.yaml
    set:
      imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-registry-secret

  - it: should set container name
    template: templates/deployment-event-process.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: event-process
