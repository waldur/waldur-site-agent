suite: secret
templates:
  - templates/secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should create secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: should use generated name
    asserts:
      - equal:
          path: metadata.name
          value: test-release-waldur-site-agent-secret

  - it: should use custom name when provided
    set:
      secret.name: my-custom-secret
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-secret

  - it: should not render when create is false
    set:
      secret.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include common labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: waldur-site-agent
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should contain base64 encoded config.yaml
    asserts:
      - isNotEmpty:
          path: data["config.yaml"]
